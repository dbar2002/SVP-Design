<!-- ========== PAGE HERO COMPONENT ========== -->
<!-- Used at the top of inner pages. Light gradient background with decorative blob. -->

<section class="page-hero">
  <div class="container">
    <span class="badge">Badge Text</span>
    <h1>Page <span class="text-accent">Title</span></h1>
    <p>One or two sentences describing this page. Max width 600px.</p>
  </div>
</section>

<!--
  VARIANTS:
  - Warm badge:  Use class="badge badge--warm" for gold accent (Reach Back pages)
  - Warm title:  Use class="text-secondary" instead of "text-accent"
-->
